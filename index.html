<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Produtos</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    input {
      width: 180px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .delete {
      background: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📦 Sistema de Produtos</h1>

    <div>
      <input id="nome" placeholder="Nome">
      <input id="preco" placeholder="Preço">
      <input id="categoria" placeholder="Categoria">
      <input id="estoque" placeholder="Estoque">
      <button onclick="criarProduto()">Salvar</button>
    </div>

    <div id="lista"></div>
  </div>

<script>
const API = "https://projeto-produtos-v0ry.onrender.com/produtos"

// 🔄 carregar produtos
async function carregarProdutos() {
  const res = await fetch(API)
  const produtos = await res.json()

  const lista = document.getElementById('lista')
  lista.innerHTML = ''

  produtos.forEach(p => {
    lista.innerHTML += `
      <div class="card">
        <strong>${p.nome}</strong><br>
        💰 R$ ${p.preco}<br>
        📦 ${p.categoria}<br>
        🏷 Estoque: ${p.estoque}<br>
        <button class="delete" onclick="deletarProduto('${p._id}')">Excluir</button>
      </div>
    `
  })
}

// ➕ criar produto
async function criarProduto() {
  const nome = document.getElementById('nome').value
  const preco = document.getElementById('preco').value
  const categoria = document.getElementById('categoria').value
  const estoque = document.getElementById('estoque').value

  await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nome,
      preco: Number(preco),
      categoria,
      estoque: Number(estoque)
    })
  })

  carregarProdutos()
}

// ❌ deletar produto
async function deletarProduto(id) {
  await fetch(`${API}/${id}`, {
    method: 'DELETE'
  })

  carregarProdutos()
}

// 🚀 iniciar
carregarProdutos()
</script>

</body>
</html>
